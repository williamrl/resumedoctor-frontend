<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Doctor — AI-Powered Resume Optimization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1c1c1c;
            --bg-elevated: #242424;
            --text-primary: #ffffff;
            --text-secondary: #a8a8a8;
            --text-muted: #6b6b6b;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --accent-glow: rgba(220, 38, 38, 0.15);
            --accent-soft: rgba(220, 38, 38, 0.08);
            --success: #10b981;
            --error: #ef4444;
            --border: #2a2a2a;
            --border-light: #333333;
        }
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at top left, var(--accent-glow) 0%, transparent 40%),
                radial-gradient(ellipse at bottom right, rgba(220, 38, 38, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        #root { 
            min-height: 100vh; 
            position: relative;
            z-index: 1;
        }
        input, textarea, button { font-family: inherit; }
        
        button {
            transition: all 0.2s ease;
        }
        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        input, textarea {
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #a8a8a8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .accent-gradient {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = 'https://resumedoctor-production.up.railway.app/api';
        const stripe = Stripe('pk_live_51TZbUX2STsB7bGsyfQvvIIFEWGF66Gg7f8AKcB1tXudnMx0dGtD3H3KrXFY5TYptdhWbGy2O2nKezwxcXd1wcupQ00HbyfiDV3');

        const ResumeTailorApp = () => {
            const [screen, setScreen] = React.useState('landing');
            const [user, setUser] = React.useState(null);
            
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [name, setName] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);
            
            const [step, setStep] = React.useState('input');
            const [resumeFile, setResumeFile] = React.useState(null);
            const [jobDescription, setJobDescription] = React.useState('');
            const [tailoredResume, setTailoredResume] = React.useState('');
            const [pdfBase64, setPdfBase64] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            
            const [showPayment, setShowPayment] = React.useState(false);
            const [paymentLoading, setPaymentLoading] = React.useState(false);

            React.useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('payment') === 'success' && user) {
                  fetch(`${API_URL}/user/${user.userId}/tailors`)
                    .then(r => r.json())
                    .then(data => setUser({ ...user, tailorsAvailable: data.tailorsAvailable }));
                }
            }, [user]);

            const handleRegister = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthLoading(true);
                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, name })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        setAuthError(data.error || 'Registration failed');
                        setAuthLoading(false);
                        return;
                    }
                    setUser(data);
                    setScreen('app');
                    setAuthLoading(false);
                } catch (err) {
                    setAuthError('Connection error. Please try again.');
                    setAuthLoading(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthLoading(true);
                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        setAuthError(data.error || 'Login failed');
                        setAuthLoading(false);
                        return;
                    }
                    setUser(data);
                    setScreen('app');
                    setAuthLoading(false);
                } catch (err) {
                    setAuthError('Connection error. Please try again.');
                    setAuthLoading(false);
                }
            };

            const handlePayment = async () => {
                setPaymentLoading(true);
                try {
                    const response = await fetch(`${API_URL}/create-checkout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.userId })
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        setError(data.error || 'Payment setup failed');
                        setPaymentLoading(false);
                        return;
                    }

                    const result = await stripe.redirectToCheckout({ sessionId: data.sessionId });
                    
                    if (result.error) {
                        setError(result.error.message);
                    }
                    setPaymentLoading(false);
                } catch (err) {
                    setError('Payment error. Please try again.');
                    setPaymentLoading(false);
                }
            };

            const tailorResume = async () => {
                if (user.tailorsAvailable <= 0) {
                    setShowPayment(true);
                    return;
                }

                if (!resumeFile) {
                    setError('Please upload a resume file.');
                    return;
                }

                if (!jobDescription || jobDescription.trim().length < 50) {
                    setError('Please provide a job description (minimum 50 characters).');
                    return;
                }

                setLoading(true);
                setError('');
                try {
                    const formData = new FormData();
                    formData.append('resume', resumeFile);
                    formData.append('userId', user.userId);
                    formData.append('jobDescription', jobDescription);

                    const response = await fetch(`${API_URL}/tailor-resume`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        setError(data.error || 'Error tailoring resume');
                        setLoading(false);
                        return;
                    }

                    setTailoredResume(data.tailoredResume);
                    setPdfBase64(data.pdfBase64);
                    setUser({ ...user, tailorsAvailable: data.tailorsRemaining });
                    setStep('result');
                    setLoading(false);
                } catch (err) {
                    setError('Error processing resume. Please try again.');
                    setLoading(false);
                }
            };

            const downloadPDF = () => {
                if (!pdfBase64) {
                    alert('PDF not available');
                    return;
                }
                const byteCharacters = atob(pdfBase64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'resume-tailored.pdf';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(tailoredResume);
            };

            const resetApp = () => {
                setStep('input');
                setResumeFile(null);
                setJobDescription('');
                setTailoredResume('');
                setPdfBase64(null);
                setError('');
                setShowPayment(false);
            };

            return (
                <>
                    {screen === 'landing' && <LandingPage setScreen={setScreen} />}
                    {(screen === 'signup' || screen === 'signin') && (
                        <AuthScreen
                            isSignup={screen === 'signup'}
                            email={email}
                            setEmail={setEmail}
                            password={password}
                            setPassword={setPassword}
                            name={name}
                            setName={setName}
                            authError={authError}
                            authLoading={authLoading}
                            handleLogin={handleLogin}
                            handleRegister={handleRegister}
                            setScreen={setScreen}
                        />
                    )}
                    {screen === 'app' && user && (
                        <AppScreen
                            user={user}
                            step={step}
                            setStep={setStep}
                            resumeFile={resumeFile}
                            setResumeFile={setResumeFile}
                            jobDescription={jobDescription}
                            setJobDescription={setJobDescription}
                            tailoredResume={tailoredResume}
                            pdfBase64={pdfBase64}
                            loading={loading}
                            error={error}
                            setError={setError}
                            tailorResume={tailorResume}
                            downloadPDF={downloadPDF}
                            copyToClipboard={copyToClipboard}
                            resetApp={resetApp}
                            handleLogout={() => { setUser(null); setEmail(''); setPassword(''); setName(''); setScreen('landing'); }}
                            showPayment={showPayment}
                            setShowPayment={setShowPayment}
                            handlePayment={handlePayment}
                            paymentLoading={paymentLoading}
                        />
                    )}
                </>
            );
        };

        const LandingPage = ({ setScreen }) => (
            <div style={styles.landingContainer}>
                <nav style={styles.nav}>
                    <div style={styles.navContent}>
                        <div style={styles.logo}>
                            <div style={styles.logoIcon}>RT</div>
                            <span style={styles.logoText}>Resume Doctor</span>
                        </div>
                        <div style={{display: 'flex', gap: '12px', alignItems: 'center'}}>
                            <button onClick={() => setScreen('signin')} style={styles.navButtonGhost}>Sign In</button>
                            <button onClick={() => setScreen('signup')} style={styles.navButtonPrimary}>Get Started</button>
                        </div>
                    </div>
                </nav>
                
                <div style={styles.hero} className="fade-in">
                    <div style={styles.heroBadge}>
                        <span style={{color: 'var(--accent)', marginRight: '6px'}}>●</span>
                        Powered by Google Gemini
                    </div>
                    <h1 style={styles.heroTitle}>
                        Land Your Dream Job
                        <br />
                        <span style={styles.heroTitleAccent}>In Seconds.</span>
                    </h1>
                    <p style={styles.heroSubtitle}>
                        AI-powered Resume Doctoring that transforms your generic resume into a 
                        perfectly optimized application for every job you want.
                    </p>
                    <div style={styles.heroCta}>
                        <button onClick={() => setScreen('signup')} style={styles.heroPrimaryButton}>
                            Start Tailoring Now
                            <span style={{marginLeft: '8px'}}>→</span>
                        </button>
                        <button onClick={() => setScreen('signin')} style={styles.heroSecondaryButton}>
                            Sign In
                        </button>
                    </div>
                    <p style={styles.heroNote}>No subscription required • Pay per resume • Instant results</p>
                </div>
                
                <div style={styles.featuresSection}>
                    <div style={styles.featuresHeader}>
                        <h2 style={styles.sectionTitle}>Why Resume Doctor?</h2>
                        <p style={styles.sectionSubtitle}>Built for professionals who want results, not generic templates.</p>
                    </div>
                    <div style={styles.features}>
                        <Feature 
                            icon="⚡" 
                            title="Instant Results" 
                            desc="Get a professionally tailored resume in under 30 seconds." 
                        />
                        <Feature 
                            icon="🎯" 
                            title="ATS Optimized" 
                            desc="Keywords matched to beat applicant tracking systems every time." 
                        />
                        <Feature 
                            icon="🔐" 
                            title="Private & Secure" 
                            desc="Your data is never stored or shared. Period." 
                        />
                        <Feature 
                            icon="✨" 
                            title="AI-Powered" 
                            desc="Cutting-edge Google Gemini AI tailors every word for you." 
                        />
                    </div>
                </div>
                
                <div style={styles.howItWorks}>
                    <h2 style={styles.sectionTitle}>How It Works</h2>
                    <div style={styles.steps}>
                        <Step number="01" title="Upload Resume" desc="Drop your existing PDF, DOCX, or TXT file." />
                        <Step number="02" title="Paste Job" desc="Copy and paste the job description you're targeting." />
                        <Step number="03" title="Download" desc="Get your tailored, ATS-optimized resume PDF." />
                    </div>
                </div>
                
                <div style={styles.ctaSection}>
                    <h2 style={styles.ctaTitle}>Ready to stand out?</h2>
                    <p style={styles.ctaSubtitle}>Join professionals landing more interviews with tailored resumes.</p>
                    <button onClick={() => setScreen('signup')} style={styles.heroPrimaryButton}>
                        Get Started Free
                        <span style={{marginLeft: '8px'}}>→</span>
                    </button>
                </div>
                
                <footer style={styles.footer}>
                    <div style={styles.footerContent}>
                        <div style={styles.logo}>
                            <div style={styles.logoIcon}>RT</div>
                            <span style={styles.logoText}>Resume Doctor</span>
                        </div>
                        <p style={styles.footerText}>© 2026 Resume Doctor. AI-powered resume optimization.</p>
                    </div>
                </footer>
            </div>
        );

        const AuthScreen = ({ isSignup, email, setEmail, password, setPassword, name, setName, authError, authLoading, handleLogin, handleRegister, setScreen }) => (
            <div style={styles.authContainer}>
                <div style={styles.authCard} className="fade-in">
                    <div style={{textAlign: 'center', marginBottom: '32px'}}>
                        <div style={{...styles.logoIcon, margin: '0 auto 16px', width: '48px', height: '48px', fontSize: '18px'}}>RT</div>
                        <h1 style={styles.authTitle}>
                            {isSignup ? 'Create Account' : 'Welcome Back'}
                        </h1>
                        <p style={styles.authSubtitle}>
                            {isSignup ? 'Start tailoring resumes in seconds' : 'Sign in to continue'}
                        </p>
                    </div>
                    
                    <form onSubmit={isSignup ? handleRegister : handleLogin} style={{display: 'flex', flexDirection: 'column', gap: '14px'}}>
                        {isSignup && (
                            <div>
                                <label style={styles.authLabel}>Full Name</label>
                                <input 
                                    type="text" 
                                    placeholder="John Doe" 
                                    value={name} 
                                    onChange={(e) => setName(e.target.value)} 
                                    style={styles.authInput} 
                                    required
                                />
                            </div>
                        )}
                        <div>
                            <label style={styles.authLabel}>Email</label>
                            <input 
                                type="email" 
                                placeholder="you@example.com" 
                                value={email} 
                                onChange={(e) => setEmail(e.target.value)} 
                                style={styles.authInput} 
                                required
                            />
                        </div>
                        <div>
                            <label style={styles.authLabel}>Password</label>
                            <input 
                                type="password" 
                                placeholder="••••••••" 
                                value={password} 
                                onChange={(e) => setPassword(e.target.value)} 
                                style={styles.authInput} 
                                required
                            />
                        </div>
                        
                        {authError && (
                            <div style={styles.errorMessage}>
                                {authError}
                            </div>
                        )}
                        
                        <button type="submit" disabled={authLoading} style={styles.primaryButton}>
                            {authLoading && <span className="spinner"></span>}
                            {authLoading ? 'Please wait...' : isSignup ? 'Create Account' : 'Sign In'}
                        </button>
                    </form>
                    
                    <div style={styles.authSwitch}>
                        {isSignup ? 'Already have an account? ' : "Don't have an account? "}
                        <span 
                            onClick={() => setScreen(isSignup ? 'signin' : 'signup')} 
                            style={styles.authSwitchLink}
                        >
                            {isSignup ? 'Sign in' : 'Sign up'}
                        </span>
                    </div>
                    
                    <button 
                        onClick={() => setScreen('landing')} 
                        style={styles.authBackButton}
                    >
                        ← Back to home
                    </button>
                </div>
            </div>
        );

        const AppScreen = ({ user, step, setStep, resumeFile, setResumeFile, jobDescription, setJobDescription, tailoredResume, pdfBase64, loading, error, setError, tailorResume, downloadPDF, copyToClipboard, resetApp, handleLogout, showPayment, setShowPayment, handlePayment, paymentLoading }) => {
            const [copied, setCopied] = React.useState(false);
            
            const handleCopy = () => {
                copyToClipboard();
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };
            
            return (
                <div style={styles.appContainer}>
                    <header style={styles.header}>
                        <div style={styles.headerContent}>
                            <div style={styles.logo}>
                                <div style={styles.logoIcon}>RT</div>
                                <span style={styles.logoText}>Resume Doctor</span>
                            </div>
                            <div style={{display: 'flex', alignItems: 'center', gap: '16px'}}>
                                <div style={styles.tailorBadge}>
                                    <span style={{color: 'var(--accent)', marginRight: '6px'}}>●</span>
                                    {user.tailorsAvailable} {user.tailorsAvailable !== 1 ? 'tailors' : 'tailor'} left
                                </div>
                                <button onClick={handleLogout} style={styles.signOutButton}>Sign Out</button>
                            </div>
                        </div>
                    </header>

                    {showPayment && (
                        <div style={styles.paymentOverlay} className="fade-in">
                            <div style={styles.paymentCard}>
                                <div style={{textAlign: 'center', marginBottom: '24px'}}>
                                    <div style={{...styles.logoIcon, margin: '0 auto 16px', width: '56px', height: '56px', fontSize: '22px'}}>$</div>
                                    <h2 style={styles.paymentTitle}>Get a Resume Tailor</h2>
                                    <p style={styles.paymentSubtitle}>
                                        Instant AI-powered resume optimization
                                    </p>
                                </div>
                                
                                <div style={styles.priceBox}>
                                    <div style={styles.priceLabel}>One Resume Tailor</div>
                                    <div style={styles.priceAmount}>$6.99</div>
                                    <div style={styles.priceNote}>One-time payment • No subscription</div>
                                </div>
                                
                                <div style={styles.priceFeatures}>
                                    <div style={styles.priceFeature}>
                                        <span style={{color: 'var(--accent)', marginRight: '8px'}}>✓</span>
                                        ATS-optimized resume
                                    </div>
                                    <div style={styles.priceFeature}>
                                        <span style={{color: 'var(--accent)', marginRight: '8px'}}>✓</span>
                                        Professional PDF download
                                    </div>
                                    <div style={styles.priceFeature}>
                                        <span style={{color: 'var(--accent)', marginRight: '8px'}}>✓</span>
                                        Instant results
                                    </div>
                                </div>
                                
                                <button onClick={handlePayment} disabled={paymentLoading} style={styles.primaryButton}>
                                    {paymentLoading && <span className="spinner"></span>}
                                    {paymentLoading ? 'Processing...' : 'Buy Now — $6.99'}
                                </button>
                                <button onClick={() => setShowPayment(false)} style={styles.cancelButton}>
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {step === 'input' && (
                        <div style={styles.appContent} className="fade-in">
                            <div style={{maxWidth: '720px', margin: '0 auto'}}>
                                <div style={{textAlign: 'center', marginBottom: '40px'}}>
                                    <h1 style={styles.appTitle}>Tailor Your Resume</h1>
                                    <p style={styles.appSubtitle}>
                                        Upload your resume and paste the job description. We'll do the rest.
                                    </p>
                                </div>
                                
                                <div style={styles.formCard}>
                                    <div style={{marginBottom: '28px'}}>
                                        <label style={styles.label}>
                                            <span style={styles.labelNumber}>1</span>
                                            Upload Your Resume
                                        </label>
                                        <div style={{...styles.uploadArea, ...(resumeFile ? styles.uploadAreaActive : {})}}>
                                            <input 
                                                type="file" 
                                                accept=".pdf,.doc,.docx,.txt" 
                                                onChange={(e) => setResumeFile(e.target.files[0])} 
                                                style={styles.fileInput}
                                                id="resume-upload"
                                            />
                                            <label htmlFor="resume-upload" style={styles.uploadLabel}>
                                                {resumeFile ? (
                                                    <>
                                                        <div style={styles.uploadIconSuccess}>✓</div>
                                                        <div style={styles.uploadTextActive}>{resumeFile.name}</div>
                                                        <div style={styles.uploadHint}>Click to change file</div>
                                                    </>
                                                ) : (
                                                    <>
                                                        <div style={styles.uploadIcon}>↑</div>
                                                        <div style={styles.uploadText}>Drop your resume here</div>
                                                        <div style={styles.uploadHint}>PDF, DOCX, or TXT • Max 10MB</div>
                                                    </>
                                                )}
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div style={{marginBottom: '24px'}}>
                                        <label style={styles.label}>
                                            <span style={styles.labelNumber}>2</span>
                                            Paste Job Description
                                        </label>
                                        <textarea 
                                            placeholder="Paste the full job description here. Include requirements, responsibilities, and qualifications for best results..." 
                                            value={jobDescription} 
                                            onChange={(e) => setJobDescription(e.target.value)} 
                                            style={styles.textarea} 
                                        />
                                        <div style={styles.charCount}>
                                            {jobDescription.length} characters {jobDescription.length < 50 && jobDescription.length > 0 && '(minimum 50)'}
                                        </div>
                                    </div>
                                    
                                    {error && (
                                        <div style={styles.errorMessage}>
                                            {error}
                                        </div>
                                    )}
                                    
                                    <button 
                                        onClick={tailorResume} 
                                        disabled={!resumeFile || !jobDescription || loading} 
                                        style={{
                                            ...styles.primaryButton,
                                            width: '100%',
                                            padding: '16px',
                                            fontSize: '15px'
                                        }}
                                    >

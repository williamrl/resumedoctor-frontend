<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Tailor — Instantly Tailored Resumes</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Monospace+Courier:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141829;
            --bg-tertiary: #1a1f3a;
            --text-primary: #f5f7fa;
            --text-secondary: #a1aac8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --border: #252d47;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1535 100%);
            color: var(--text-primary);
            line-height: 1.6;
        }

        #root {
            min-height: 100vh;
        }

        input, textarea, button {
            font-family: inherit;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = 'https://resumedoctor-production.up.railway.app/api';

        const ResumeTailorApp = () => {
            const [screen, setScreen] = React.useState('landing'); // landing, auth, app, pricing
            const [authMode, setAuthMode] = React.useState('login'); // login, register
            const [user, setUser] = React.useState(null);
            
            // Auth form
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [name, setName] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);
            
            // Resume form
            const [step, setStep] = React.useState('input'); // input, processing, result
            const [mode, setMode] = React.useState(null); // upload, build
            const [resumeFile, setResumeFile] = React.useState(null);
            const [jobLink, setJobLink] = React.useState('');
            const [jobDescription, setJobDescription] = React.useState('');
            const [tailoredResume, setTailoredResume] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            
            // Questionnaire
            const [questionnaire, setQuestionnaire] = React.useState({
                fullName: '',
                email: '',
                phone: '',
                location: '',
                experience: [{ company: '', title: '', dates: '', accomplishments: '' }],
                skills: ''
            });

            const handleRegister = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthLoading(true);

                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, name })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        setAuthError(data.error || 'Registration failed');
                        setAuthLoading(false);
                        return;
                    }

                    setUser(data);
                    setScreen('app');
                    setAuthLoading(false);
                } catch (err) {
                    setAuthError('Connection error. Please try again.');
                    setAuthLoading(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthLoading(true);

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        setAuthError(data.error || 'Login failed');
                        setAuthLoading(false);
                        return;
                    }

                    setUser(data);
                    setScreen('app');
                    setAuthLoading(false);
                } catch (err) {
                    setAuthError('Connection error. Please try again.');
                    setAuthLoading(false);
                }
            };

            const handleResumeUpload = (e) => {
                const file = e.target.files[0];
                if (file) setResumeFile(file);
            };

            const tailorResume = async () => {
                setLoading(true);
                setError('');

                try {
                    let resumeContent = '';

                    if (mode === 'upload' && resumeFile) {
                        resumeContent = await resumeFile.text();
                    } else {
                        resumeContent = buildResumeText();
                    }

                    const response = await fetch(`${API_URL}/tailor-resume`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.userId,
                            resumeContent,
                            jobDescription
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        setError(data.error || 'Error tailoring resume');
                        setLoading(false);
                        return;
                    }

                    setTailoredResume(data.tailoredResume);
                    setUser(prev => ({ ...prev, used: data.used, limit: data.limit }));
                    setStep('result');
                    setLoading(false);
                } catch (err) {
                    setError('Error processing resume. Please try again.');
                    setLoading(false);
                }
            };

            const buildResumeText = () => {
                let text = `${questionnaire.fullName}
${questionnaire.email} | ${questionnaire.phone} | ${questionnaire.location}

EXPERIENCE
`;
                questionnaire.experience.forEach(exp => {
                    if (exp.company) {
                        text += `\n${exp.title} | ${exp.company}
${exp.dates}
${exp.accomplishments}
`;
                    }
                });

                if (questionnaire.skills) {
                    text += `\nSKILLS
${questionnaire.skills}
`;
                }

                return text;
            };

            const downloadResume = () => {
                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(tailoredResume));
                element.setAttribute('download', 'resume-tailored.txt');
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(tailoredResume);
                alert('Resume copied to clipboard!');
            };

            const resetApp = () => {
                setStep('input');
                setMode(null);
                setResumeFile(null);
                setJobDescription('');
                setTailoredResume('');
                setError('');
            };

            const handleLogout = () => {
                setUser(null);
                setScreen('landing');
                setEmail('');
                setPassword('');
                setName('');
                resetApp();
            };

            return (
                <>
                    {screen === 'landing' && <LandingPage setScreen={setScreen} />}
                    {screen === 'auth' && (
                        <AuthScreen
                            authMode={authMode}
                            setAuthMode={setAuthMode}
                            email={email}
                            setEmail={setEmail}
                            password={password}
                            setPassword={setPassword}
                            name={name}
                            setName={setName}
                            authError={authError}
                            authLoading={authLoading}
                            handleLogin={handleLogin}
                            handleRegister={handleRegister}
                            setScreen={setScreen}
                        />
                    )}
                    {screen === 'app' && user && (
                        <AppScreen
                            user={user}
                            step={step}
                            setStep={setStep}
                            mode={mode}
                            setMode={setMode}
                            resumeFile={resumeFile}
                            handleResumeUpload={handleResumeUpload}
                            jobLink={jobLink}
                            setJobLink={setJobLink}
                            jobDescription={jobDescription}
                            setJobDescription={setJobDescription}
                            tailoredResume={tailoredResume}
                            loading={loading}
                            error={error}
                            setError={setError}
                            tailorResume={tailorResume}
                            downloadResume={downloadResume}
                            copyToClipboard={copyToClipboard}
                            resetApp={resetApp}
                            handleLogout={handleLogout}
                            questionnaire={questionnaire}
                            setQuestionnaire={setQuestionnaire}
                        />
                    )}
                    {screen === 'pricing' && <PricingPage setScreen={setScreen} />}
                </>
            );
        };

        const LandingPage = ({ setScreen }) => (
            <div style={styles.landingContainer}>
                <nav style={styles.nav}>
                    <div style={styles.navContent}>
                        <div style={{fontSize: '20px', fontWeight: '700', letterSpacing: '-0.5px'}}>Resume Tailor</div>
                        <button onClick={() => setScreen('auth')} style={{...styles.navButton, background: 'var(--accent)'}}>Sign In</button>
                    </div>
                </nav>

                <div style={styles.hero}>
                    <div style={{animation: 'slideUp 0.8s ease-out'}}>
                        <h1 style={styles.heroTitle}>Your Resume, Tailored Perfectly</h1>
                        <p style={styles.heroSubtitle}>In seconds. For every job. Every time.</p>
                    </div>

                    <div style={{...styles.heroImage, animation: 'slideUp 0.8s ease-out 0.1s backwards'}}>
                        <div style={{...styles.demoCard}}>
                            <div style={{background: 'var(--accent)', height: '4px', borderRadius: '2px', marginBottom: '12px'}}></div>
                            <div style={{background: 'var(--border)', height: '8px', borderRadius: '2px', marginBottom: '8px', width: '60%'}}></div>
                            <div style={{background: 'var(--border)', height: '6px', borderRadius: '2px', marginBottom: '4px', width: '80%'}}></div>
                            <div style={{background: 'var(--border)', height: '6px', borderRadius: '2px', width: '70%'}}></div>
                        </div>
                    </div>

                    <div style={{marginTop: '40px', display: 'flex', gap: '12px', justifyContent: 'center', animation: 'slideUp 0.8s ease-out 0.2s backwards'}}>
                        <button onClick={() => setScreen('auth')} style={{...styles.primaryButton}}>Get Started Free</button>
                        <button style={{...styles.secondaryButton}}>Watch Demo</button>
                    </div>
                </div>

                <div style={styles.features}>
                    <Feature icon="⚡" title="Instant Tailoring" desc="Transform your resume in seconds" />
                    <Feature icon="🎯" title="Keyword Matching" desc="Optimized for ATS systems" />
                    <Feature icon="🔐" title="Secure & Private" desc="Your data stays with you" />
                    <Feature icon="💼" title="Professional Grade" desc="AI-powered by Claude" />
                </div>
            </div>
        );

        const Feature = ({ icon, title, desc }) => (
            <div style={{padding: '24px', background: 'var(--bg-secondary)', border: `1px solid var(--border)`, borderRadius: '8px', textAlign: 'center'}}>
                <div style={{fontSize: '32px', marginBottom: '12px'}}>{icon}</div>
                <div style={{fontWeight: '600', marginBottom: '6px'}}>{title}</div>
                <div style={{fontSize: '14px', color: 'var(--text-secondary)'}}>{desc}</div>
            </div>
        );

        const AuthScreen = ({
            authMode, setAuthMode, email, setEmail, password, setPassword, name, setName,
            authError, authLoading, handleLogin, handleRegister, setScreen
        }) => (
            <div style={styles.authContainer}>
                <div style={styles.authCard}>
                    <div style={{marginBottom: '30px', textAlign: 'center'}}>
                        <h1 style={{fontSize: '24px', fontWeight: '700', marginBottom: '8px'}}>Resume Tailor</h1>
                        <p style={{color: 'var(--text-secondary)', fontSize: '14px'}}>
                            {authMode === 'login' ? 'Sign in to continue' : 'Create your account'}
                        </p>
                    </div>

                    <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                        {authMode === 'register' && (
                            <input
                                type="text"
                                placeholder="Full name"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                style={styles.authInput}
                            />
                        )}
                        <input
                            type="email"
                            placeholder="Email"
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            style={styles.authInput}
                        />
                        <input
                            type="password"
                            placeholder="Password"
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            style={styles.authInput}
                        />
                        {authError && <div style={{color: 'var(--error)', fontSize: '14px'}}>{authError}</div>}
                        <button type="submit" disabled={authLoading} style={styles.primaryButton}>
                            {authLoading ? 'Loading...' : authMode === 'login' ? 'Sign In' : 'Create Account'}
                        </button>
                    </form>

                    <div style={{textAlign: 'center', marginTop: '20px', fontSize: '14px', color: 'var(--text-secondary)'}}>
                        {authMode === 'login' ? 'No account? ' : 'Have an account? '}
                        <span onClick={() => setAuthMode(authMode === 'login' ? 'register' : 'login')} style={{color: 'var(--accent)', cursor: 'pointer', fontWeight: '600'}}>
                            {authMode === 'login' ? 'Sign up' : 'Sign in'}
                        </span>
                    </div>
                </div>
            </div>
        );

        const AppScreen = ({
            user, step, setStep, mode, setMode, resumeFile, handleResumeUpload,
            jobLink, setJobLink, jobDescription, setJobDescription, tailoredResume,
            loading, error, setError, tailorResume, downloadResume, copyToClipboard,
            resetApp, handleLogout, questionnaire, setQuestionnaire
        }) => (
            <div style={styles.appContainer}>
                <header style={styles.header}>
                    <div style={styles.headerContent}>
                        <div style={{fontSize: '18px', fontWeight: '700'}}>Resume Tailor</div>
                        <div style={{display: 'flex', alignItems: 'center', gap: '16px'}}>
                            <div style={{fontSize: '13px', color: 'var(--text-secondary)'}}>
                                {user.used}/{user.limit} tailored this month
                            </div>
                            <button onClick={handleLogout} style={{...styles.navButton, color: 'var(--text-secondary)'}}>Sign Out</button>
                        </div>
                    </div>
                </header>

                {step === 'input' && !mode && (
                    <div style={styles.appContent}>
                        <div style={{maxWidth: '600px', margin: '0 auto'}}>
                            <h2 style={{fontSize: '28px', fontWeight: '700', marginBottom: '12px'}}>Get Started</h2>
                            <p style={{color: 'var(--text-secondary)', marginBottom: '40px'}}>How would you like to proceed?</p>

                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px'}}>
                                <Card
                                    icon="📄"
                                    title="Upload Resume"
                                    desc="Have a resume ready?"
                                    onClick={() => setMode('upload')}
                                />
                                <Card
                                    icon="✍️"
                                    title="Build Resume"
                                    desc="Create one from scratch"
                                    onClick={() => setMode('build')}
                                />
                            </div>
                        </div>
                    </div>
                )}

                {step === 'input' && mode === 'upload' && (
                    <div style={styles.appContent}>
                        <div style={{maxWidth: '600px', margin: '0 auto'}}>
                            <button onClick={() => setMode(null)} style={styles.backButton}>← Back</button>

                            <h2 style={{fontSize: '24px', fontWeight: '700', marginBottom: '24px'}}>Upload Your Resume</h2>

                            <div style={{marginBottom: '24px'}}>
                                <label style={styles.label}>Resume File</label>
                                <div style={styles.uploadArea}>
                                    <input
                                        type="file"
                                        accept=".pdf,.doc,.docx,.txt"
                                        onChange={handleResumeUpload}
                                        style={{cursor: 'pointer'}}
                                    />
                                    <p style={{marginTop: '12px', color: 'var(--text-secondary)', fontSize: '13px'}}>
                                        PDF, Word, or text file
                                    </p>
                                </div>
                                {resumeFile && <p style={{marginTop: '8px', color: 'var(--success)'}}>✓ {resumeFile.name}</p>}
                            </div>

                            <div style={{marginBottom: '24px'}}>
                                <label style={styles.label}>Job Posting</label>
                                <textarea
                                    placeholder="Paste the complete job description here..."
                                    value={jobDescription}
                                    onChange={(e) => setJobDescription(e.target.value)}
                                    style={{...styles.textarea, minHeight: '200px'}}
                                />
                            </div>

                            {error && <div style={{color: 'var(--error)', marginBottom: '16px', fontSize: '14px'}}>{error}</div>}

                            <button
                                onClick={tailorResume}
                                disabled={!resumeFile || !jobDescription || loading}
                                style={{...styles.primaryButton, opacity: !resumeFile || !jobDescription ? 0.5 : 1}}
                            >
                                {loading ? 'Tailoring...' : 'Tailor Resume'}
                            </button>
                        </div>
                    </div>
                )}

                {step === 'input' && mode === 'build' && (
                    <div style={styles.appContent}>
                        <div style={{maxWidth: '600px', margin: '0 auto'}}>
                            <button onClick={() => setMode(null)} style={styles.backButton}>← Back</button>

                            <h2 style={{fontSize: '24px', fontWeight: '700', marginBottom: '24px'}}>Build Your Resume</h2>

                            <div style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                                <div>
                                    <label style={styles.label}>Full Name</label>
                                    <input
                                        type="text"
                                        value={questionnaire.fullName}
                                        onChange={(e) => setQuestionnaire({...questionnaire, fullName: e.target.value})}
                                        style={styles.input}
                                    />
                                </div>

                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px'}}>
                                    <div>
                                        <label style={styles.label}>Email</label>
                                        <input type="email" style={styles.input} />
                                    </div>
                                    <div>
                                        <label style={styles.label}>Phone</label>
                                        <input type="tel" style={styles.input} />
                                    </div>
                                </div>

                                <div>
                                    <label style={styles.label}>Skills</label>
                                    <textarea
                                        value={questionnaire.skills}
                                        onChange={(e) => setQuestionnaire({...questionnaire, skills: e.target.value})}
                                        placeholder="Python, JavaScript, React..."
                                        style={styles.textarea}
                                    />
                                </div>

                                <div>
                                    <label style={styles.label}>Job Posting *Required</label>
                                    <textarea
                                        value={jobDescription}
                                        onChange={(e) => setJobDescription(e.target.value)}
                                        placeholder="Paste job description here..."
                                        style={{...styles.textarea, minHeight: '200px'}}
                                    />
                                </div>

                                {error && <div style={{color: 'var(--error)', fontSize: '14px'}}>{error}</div>}

                                <button
                                    onClick={tailorResume}
                                    disabled={!jobDescription || !questionnaire.fullName || loading}
                                    style={{...styles.primaryButton, opacity: !jobDescription || !questionnaire.fullName ? 0.5 : 1}}
                                >
                                    {loading ? 'Creating...' : 'Generate & Tailor Resume'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {step === 'result' && (
                    <div style={styles.appContent}>
                        <div style={{maxWidth: '700px', margin: '0 auto'}}>
                            <h2 style={{fontSize: '24px', fontWeight: '700', marginBottom: '24px'}}>Your Tailored Resume</h2>

                            <div style={styles.resumePreview}>
                                {tailoredResume.split('\n').map((line, idx) => (
                                    <div key={idx} style={{whiteSpace: 'pre-wrap'}}>{line || '\n'}</div>
                                ))}
                            </div>

                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', marginTop: '24px'}}>
                                <button onClick={copyToClipboard} style={{...styles.primaryButton, marginTop: '0'}}>Copy</button>
                                <button onClick={downloadResume} style={{...styles.secondaryButton, marginTop: '0'}}>Download</button>
                                <button onClick={resetApp} style={{...styles.secondaryButton, marginTop: '0'}}>New Resume</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );

        const Card = ({ icon, title, desc, onClick }) => (
            <div
                onClick={onClick}
                style={{
                    padding: '24px',
                    background: 'var(--bg-secondary)',
                    border: `1px solid var(--border)`,
                    borderRadius: '8px',
                    cursor: 'pointer',
                    transition: 'all 0.2s',
                    textAlign: 'center'
                }}
                onMouseEnter={(e) => {
                    e.currentTarget.style.borderColor = 'var(--accent)';
                    e.currentTarget.style.background = 'var(--bg-tertiary)';
                }}
                onMouseLeave={(e) => {
                    e.currentTarget.style.borderColor = 'var(--border)';
                    e.currentTarget.style.background = 'var(--bg-secondary)';
                }}
            >
                <div style={{fontSize: '32px', marginBottom: '12px'}}>{icon}</div>
                <div style={{fontWeight: '600', marginBottom: '6px'}}>{title}</div>
                <div style={{fontSize: '13px', color: 'var(--text-secondary)'}}>{desc}</div>
            </div>
        );

        const styles = {
            landingContainer: {
                minHeight: '100vh',
                display: 'flex',
                flexDirection: 'column',
            },
            nav: {
                padding: '20px 0',
                borderBottom: `1px solid var(--border)`,
                position: 'sticky',
                top: 0,
                zIndex: 10,
                background: 'rgba(10, 14, 39, 0.8)',
                backdropFilter: 'blur(10px)',
            },
            navContent: {
                maxWidth: '1200px',
                margin: '0 auto',
                padding: '0 20px',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
            },
            navButton: {
                padding: '8px 16px',
                background: 'transparent',
                border: `1px solid var(--border)`,
                color: 'var(--text-primary)',
                borderRadius: '6px',
                cursor: 'pointer',
                fontSize: '13px',
                fontWeight: '500',
                transition: 'all 0.2s',
            },
            hero: {
                flex: 1,
                display: 'flex',
                flexDirection: 'column',
                justifyContent: 'center',
                alignItems: 'center',
                padding: '60px 20px',
                textAlign: 'center',
            },
            heroTitle: {
                fontSize: '52px',
                fontWeight: '700',
                marginBottom: '16px',
                background: 'linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%)',
                backgroundClip: 'text',
                WebkitBackgroundClip: 'text',
                color: 'transparent',
            },
            heroSubtitle: {
                fontSize: '18px',
                color: 'var(--text-secondary)',
            },
            heroImage: {
                marginTop: '40px',
                width: '100%',
                maxWidth: '400px',
            },
            demoCard: {
                padding: '20px',
                background: 'var(--bg-secondary)',
                border: `1px solid var(--border)`,
                borderRadius: '8px',
            },
            primaryButton: {
                padding: '12px 24px',
                background: 'var(--accent)',
                color: '#fff',
                border: 'none',
                borderRadius: '6px',
                fontWeight: '600',
                cursor: 'pointer',
                transition: 'all 0.2s',
                fontSize: '14px',
            },
            secondaryButton: {
                padding: '12px 24px',
                background: 'transparent',
                color: 'var(--text-primary)',
                border: `1px solid var(--border)`,
                borderRadius: '6px',
                fontWeight: '600',
                cursor: 'pointer',
                transition: 'all 0.2s',
                fontSize: '14px',
            },
            features: {
                maxWidth: '1200px',
                margin: '0 auto',

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Tailor — Instantly Tailored Resumes</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141829;
            --bg-tertiary: #1a1f3a;
            --text-primary: #f5f7fa;
            --text-secondary: #a1aac8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --border: #252d47;
        }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1535 100%);
            color: var(--text-primary);
            line-height: 1.6;
        }
        #root { min-height: 100vh; }
        input, textarea, button { font-family: inherit; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = 'https://resumedoctor-production.up.railway.app/api';
        const stripe = Stripe('pk_live_51TZbUX2STsB7bGsyfQvvIIFEWGF66Gg7f8AKcB1tXudnMx0dGtD3H3KrXFY5TYptdhWbGy2O2nKezwxcXd1wcupQ00HbyfiDV3');

        const ResumeTailorApp = () => {
            const [screen, setScreen] = React.useState('landing');
            const [user, setUser] = React.useState(null);
            
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [name, setName] = React.useState('');
            const [authError, setAuthError] = React.useState('');
            const [authLoading, setAuthLoading] = React.useState(false);
            
            const [step, setStep] = React.useState('input');
            const [resumeFile, setResumeFile] = React.useState(null);
            const [jobDescription, setJobDescription] = React.useState('');
            const [tailoredResume, setTailoredResume] = React.useState('');
            const [pdfBase64, setPdfBase64] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');
            
            const [showPayment, setShowPayment] = React.useState(false);
            const [paymentLoading, setPaymentLoading] = React.useState(false);

            React.useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('payment') === 'success' && user) {
                  fetch(`${API_URL}/user/${user.userId}/tailors`)
                    .then(r => r.json())
                    .then(data => setUser({ ...user, tailorsAvailable: data.tailorsAvailable }));
                }
            }, [user]);

            const handleRegister = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthLoading(true);
                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, name })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        setAuthError(data.error || 'Registration failed');
                        setAuthLoading(false);
                        return;
                    }
                    setUser(data);
                    setScreen('app');
                    setAuthLoading(false);
                } catch (err) {
                    setAuthError('Connection error. Please try again.');
                    setAuthLoading(false);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError('');
                setAuthLoading(true);
                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        setAuthError(data.error || 'Login failed');
                        setAuthLoading(false);
                        return;
                    }
                    setUser(data);
                    setScreen('app');
                    setAuthLoading(false);
                } catch (err) {
                    setAuthError('Connection error. Please try again.');
                    setAuthLoading(false);
                }
            };

            const handlePayment = async () => {
                setPaymentLoading(true);
                try {
                    const response = await fetch(`${API_URL}/create-checkout`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.userId })
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        setError(data.error || 'Payment setup failed');
                        setPaymentLoading(false);
                        return;
                    }

                    const result = await stripe.redirectToCheckout({ sessionId: data.sessionId });
                    
                    if (result.error) {
                        setError(result.error.message);
                    }
                    setPaymentLoading(false);
                } catch (err) {
                    setError('Payment error. Please try again.');
                    setPaymentLoading(false);
                }
            };

            const tailorResume = async () => {
                if (user.tailorsAvailable <= 0) {
                    setShowPayment(true);
                    return;
                }

                if (!resumeFile) {
                    setError('Please upload a resume file.');
                    return;
                }

                if (!jobDescription || jobDescription.trim().length < 50) {
                    setError('Please provide a job description (minimum 50 characters).');
                    return;
                }

                setLoading(true);
                setError('');
                try {
                    const formData = new FormData();
                    formData.append('resume', resumeFile);
                    formData.append('userId', user.userId);
                    formData.append('jobDescription', jobDescription);

                    const response = await fetch(`${API_URL}/tailor-resume`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        setError(data.error || 'Error tailoring resume');
                        setLoading(false);
                        return;
                    }

                    setTailoredResume(data.tailoredResume);
                    setPdfBase64(data.pdfBase64);
                    setUser({ ...user, tailorsAvailable: data.tailorsRemaining });
                    setStep('result');
                    setLoading(false);
                } catch (err) {
                    setError('Error processing resume. Please try again.');
                    setLoading(false);
                }
            };

            const downloadPDF = () => {
                if (!pdfBase64) {
                    alert('PDF not available');
                    return;
                }
                const byteCharacters = atob(pdfBase64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'resume-tailored.pdf';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(tailoredResume);
                alert('Resume copied to clipboard!');
            };

            const resetApp = () => {
                setStep('input');
                setResumeFile(null);
                setJobDescription('');
                setTailoredResume('');
                setPdfBase64(null);
                setError('');
                setShowPayment(false);
            };

            return (
                <>
                    {screen === 'landing' && <LandingPage setScreen={setScreen} />}
                    {(screen === 'signup' || screen === 'signin') && (
                        <AuthScreen
                            isSignup={screen === 'signup'}
                            email={email}
                            setEmail={setEmail}
                            password={password}
                            setPassword={setPassword}
                            name={name}
                            setName={setName}
                            authError={authError}
                            authLoading={authLoading}
                            handleLogin={handleLogin}
                            handleRegister={handleRegister}
                            setScreen={setScreen}
                        />
                    )}
                    {screen === 'app' && user && (
                        <AppScreen
                            user={user}
                            step={step}
                            setStep={setStep}
                            resumeFile={resumeFile}
                            setResumeFile={setResumeFile}
                            jobDescription={jobDescription}
                            setJobDescription={setJobDescription}
                            tailoredResume={tailoredResume}
                            pdfBase64={pdfBase64}
                            loading={loading}
                            error={error}
                            setError={setError}
                            tailorResume={tailorResume}
                            downloadPDF={downloadPDF}
                            copyToClipboard={copyToClipboard}
                            resetApp={resetApp}
                            handleLogout={() => { setUser(null); setEmail(''); setPassword(''); setName(''); setScreen('landing'); }}
                            showPayment={showPayment}
                            setShowPayment={setShowPayment}
                            handlePayment={handlePayment}
                            paymentLoading={paymentLoading}
                        />
                    )}
                </>
            );
        };

        const LandingPage = ({ setScreen }) => (
            <div style={styles.landingContainer}>
                <nav style={styles.nav}>
                    <div style={styles.navContent}>
                        <div style={{fontSize: '20px', fontWeight: '700'}}>Resume Tailor</div>
                        <button onClick={() => setScreen('signin')} style={styles.navButton}>Sign In</button>
                    </div>
                </nav>
                <div style={styles.hero}>
                    <h1 style={styles.heroTitle}>Your Resume, Tailored Perfectly</h1>
                    <p style={styles.heroSubtitle}>In seconds. For every job. Every time.</p>
                    <button onClick={() => setScreen('signup')} style={styles.primaryButton}>Get Started Free</button>
                </div>
                <div style={styles.features}>
                    <Feature icon="⚡" title="Instant Tailoring" desc="Transform your resume in seconds" />
                    <Feature icon="🎯" title="Keyword Matching" desc="Optimized for ATS systems" />
                    <Feature icon="🔐" title="Secure & Private" desc="Your data stays with you" />
                    <Feature icon="✨" title="AI-Powered" desc="Powered by Google Gemini" />
                </div>
            </div>
        );

        const AuthScreen = ({ isSignup, email, setEmail, password, setPassword, name, setName, authError, authLoading, handleLogin, handleRegister, setScreen }) => (
            <div style={styles.authContainer}>
                <div style={styles.authCard}>
                    <h1 style={{fontSize: '24px', fontWeight: '700', marginBottom: '8px', textAlign: 'center'}}>Resume Tailor</h1>
                    <p style={{color: 'var(--text-secondary)', fontSize: '14px', textAlign: 'center', marginBottom: '30px'}}>
                        {isSignup ? 'Create your account' : 'Sign in to your account'}
                    </p>
                    <form onSubmit={isSignup ? handleRegister : handleLogin} style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                        {isSignup && (
                            <input type="text" placeholder="Full name" value={name} onChange={(e) => setName(e.target.value)} style={styles.authInput} />
                        )}
                        <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} style={styles.authInput} />
                        <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} style={styles.authInput} />
                        {authError && <div style={{color: 'var(--error)', fontSize: '14px'}}>{authError}</div>}
                        <button type="submit" disabled={authLoading} style={styles.primaryButton}>
                            {authLoading ? 'Loading...' : isSignup ? 'Create Account' : 'Sign In'}
                        </button>
                    </form>
                    <div style={{textAlign: 'center', marginTop: '20px', fontSize: '14px', color: 'var(--text-secondary)'}}>
                        {isSignup ? 'Already have one? ' : "Don't have an account? "}
                        <span onClick={() => setScreen(isSignup ? 'signin' : 'signup')} style={{color: 'var(--accent)', cursor: 'pointer', fontWeight: '600'}}>
                            {isSignup ? 'Sign in' : 'Sign up'}
                        </span>
                    </div>
                    <button onClick={() => setScreen('landing')} style={{marginTop: '20px', color: 'var(--text-secondary)', background: 'none', border: 'none', cursor: 'pointer', fontSize: '13px', width: '100%', textDecoration: 'underline'}}>
                        ← Back to home
                    </button>
                </div>
            </div>
        );

        const AppScreen = ({ user, step, setStep, resumeFile, setResumeFile, jobDescription, setJobDescription, tailoredResume, pdfBase64, loading, error, setError, tailorResume, downloadPDF, copyToClipboard, resetApp, handleLogout, showPayment, setShowPayment, handlePayment, paymentLoading }) => (
            <div style={styles.appContainer}>
                <header style={styles.header}>
                    <div style={styles.headerContent}>
                        <div style={{fontSize: '18px', fontWeight: '700'}}>Resume Tailor</div>
                        <div style={{display: 'flex', alignItems: 'center', gap: '20px'}}>
                            <div style={{fontSize: '13px', color: 'var(--text-secondary)'}}>
                                {user.tailorsAvailable} tailor{user.tailorsAvailable !== 1 ? 's' : ''} available
                            </div>
                            <button onClick={handleLogout} style={{...styles.navButton, color: 'var(--text-secondary)'}}>Sign Out</button>
                        </div>
                    </div>
                </header>

                {showPayment && (
                    <div style={styles.paymentOverlay}>
                        <div style={styles.paymentCard}>
                            <h2 style={{fontSize: '24px', fontWeight: '700', marginBottom: '16px', textAlign: 'center'}}>Tailor Your Resume</h2>
                            <p style={{color: 'var(--text-secondary)', textAlign: 'center', marginBottom: '24px'}}>
                                Get one resume tailor instantly.
                            </p>
                            <div style={{background: 'var(--bg-secondary)', padding: '20px', borderRadius: '8px', marginBottom: '24px', textAlign: 'center'}}>
                                <div style={{fontSize: '14px', color: 'var(--text-secondary)', marginBottom: '8px'}}>Per Resume Tailor</div>
                                <div style={{fontSize: '32px', fontWeight: '700'}}>$6.99</div>
                            </div>
                            <button onClick={handlePayment} disabled={paymentLoading} style={styles.primaryButton}>
                                {paymentLoading ? 'Processing...' : 'Buy 1 Tailor'}
                            </button>
                            <button onClick={() => setShowPayment(false)} style={{marginTop: '12px', width: '100%', padding: '12px', background: 'transparent', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: '14px'}}>
                                Cancel
                            </button>
                        </div>
                    </div>
                )}

                {step === 'input' && (
                    <div style={styles.appContent}>
                        <div style={{maxWidth: '600px', margin: '0 auto'}}>
                            <h2 style={{fontSize: '28px', fontWeight: '700', marginBottom: '40px'}}>Upload Your Resume</h2>
                            <div style={{marginBottom: '24px'}}>
                                <label style={styles.label}>Resume File</label>
                                <div style={styles.uploadArea}>
                                    <input type="file" accept=".pdf,.doc,.docx,.txt" onChange={(e) => setResumeFile(e.target.files[0])} style={{cursor: 'pointer'}} />
                                    <p style={{marginTop: '12px', color: 'var(--text-secondary)', fontSize: '13px'}}>PDF, Word, or text file</p>
                                </div>
                                {resumeFile && <p style={{marginTop: '8px', color: 'var(--success)'}}>✓ {resumeFile.name}</p>}
                            </div>
                            <div style={{marginBottom: '24px'}}>
                                <label style={styles.label}>Job Description</label>
                                <textarea placeholder="Paste the full job description here..." value={jobDescription} onChange={(e) => setJobDescription(e.target.value)} style={{...styles.textarea, minHeight: '150px'}} />
                            </div>
                            {error && <div style={{color: 'var(--error)', marginBottom: '16px', fontSize: '14px'}}>{error}</div>}
                            <button onClick={tailorResume} disabled={!resumeFile || !jobDescription || loading} style={{...styles.primaryButton, opacity: !resumeFile || !jobDescription ? 0.5 : 1}}>
                                {loading ? 'Tailoring...' : user.tailorsAvailable > 0 ? 'Tailor Resume' : 'Buy & Tailor'}
                            </button>
                        </div>
                    </div>
                )}
                
                {step === 'result' && (
                    <div style={styles.appContent}>
                        <div style={{maxWidth: '900px', margin: '0 auto'}}>
                            <h2 style={{fontSize: '24px', fontWeight: '700', marginBottom: '24px'}}>Your Tailored Resume</h2>
                            {pdfBase64 && (
                                <div style={{marginBottom: '24px', border: '1px solid var(--border)', borderRadius: '8px', overflow: 'hidden', background: 'white', boxShadow: '0 10px 25px rgba(0,0,0,0.2)'}}>
                                    <iframe 
                                        src={`data:application/pdf;base64,${pdfBase64}`}
                                        style={{width: '100%', height: '700px', border: 'none'}}
                                        title="Resume Preview"
                                    />
                                </div>
                            )}
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', marginTop: '24px'}}>
                                <button onClick={downloadPDF} style={{...styles.primaryButton, marginTop: '0'}}>Download PDF</button>
                                <button onClick={copyToClipboard} style={{...styles.primaryButton, marginTop: '0'}}>Copy Text</button>
                                <button onClick={resetApp} style={{...styles.primaryButton, marginTop: '0'}}>New Resume</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );

        const Feature = ({ icon, title, desc }) => (
            <div style={{padding: '24px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', borderRadius: '8px', textAlign: 'center'}}>
                <div style={{fontSize: '32px', marginBottom: '12px'}}>{icon}</div>
                <div style={{fontWeight: '600', marginBottom: '6px'}}>{title}</div>
                <div style={{fontSize: '14px', color: 'var(--text-secondary)'}}>{desc}</div>
            </div>
        );

        const styles = {
            landingContainer: { minHeight: '100vh', display: 'flex', flexDirection: 'column' },
            nav: { padding: '20px 0', borderBottom: '1px solid var(--border)', background: 'rgba(10, 14, 39, 0.8)', backdropFilter: 'blur(10px)' },
            navContent: { maxWidth: '1200px', margin: '0 auto', padding: '0 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' },
            navButton: { padding: '8px 16px', background: 'transparent', border: '1px solid var(--border)', color: 'var(--text-primary)', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', fontWeight: '500' },
            hero: { flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', padding: '60px 20px', textAlign: 'center' },
            heroTitle: { fontSize: '52px', fontWeight: '700', marginBottom: '16px', background: 'linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%)', backgroundClip: 'text', WebkitBackgroundClip: 'text', color: 'transparent' },
            heroSubtitle: { fontSize: '18px', color: 'var(--text-secondary)', marginBottom: '40px' },
            primaryButton: { padding: '12px 24px', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: '6px', fontWeight: '600', cursor: 'pointer', fontSize: '14px', marginTop: '16px' },
            features: { maxWidth: '1200px', margin: '0 auto', padding: '80px 20px', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '20px', width: '100%' },
            authContainer: { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' },
            authCard: { width: '100%', maxWidth: '400px', padding: '40px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', borderRadius: '12px' },
            authInput: { width: '100%', padding: '12px', background: 'var(--bg-primary)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', fontSize: '14px' },
            appContainer: { minHeight: '100vh', display: 'flex', flexDirection: 'column' },
            header: { padding: '20px 0', borderBottom: '1px solid var(--border)', background: 'rgba(10, 14, 39, 0.8)', backdropFilter: 'blur(10px)' },
            headerContent: { maxWidth: '1200px', margin: '0 auto', padding: '0 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' },
            appContent: { flex: 1, padding: '40px 20px', maxWidth: '1200px', margin: '0 auto', width: '100%' },
            paymentOverlay: { position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 },
            paymentCard: { width: '100%', maxWidth: '400px', padding: '40px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', borderRadius: '12px' },
            label: { display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '8px', color: 'var(--text-secondary)' },
            textarea: { width: '100%', padding: '12px', background: 'var(--bg-secondary)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', fontSize: '14px', fontFamily: 'monospace', resize: 'vertical' },
            uploadArea: { border: '2px dashed var(--border)', borderRadius: '8px', padding: '30px', textAlign: 'center', cursor: 'pointer' }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ResumeTailorApp />);
    </script>
</body>
</html>
